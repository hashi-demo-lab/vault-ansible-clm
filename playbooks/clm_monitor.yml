---
# playbooks/clm_monitor.yml
# Standalone certificate expiry monitoring.
# Reports status for all targeted hosts without making changes.

- name: Certificate Lifecycle - Monitor Expiry
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: true

  tasks:
    - name: Monitor certificate expiry
      ansible.builtin.include_role:
        name: cert_monitor

    - name: Summary
      ansible.builtin.debug:
        msg: >-
          Host: {{ inventory_hostname }},
          Status: {{ cert_monitor_status | default('unknown') }},
          Days remaining: {{ cert_days_remaining | default('N/A') }},
          Needs renewal: {{ cert_needs_renewal | default('unknown') }}
