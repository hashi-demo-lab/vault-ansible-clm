---
# playbooks/wf_deploy.yml
# AAP Workflow Node: Deploy issued certificate to target service.
# Reads cert data from staging files written by wf_issue.yml.

- name: "WF: Deploy Certificate"
  hosts: "{{ target_hosts | default('all') }}"
  serial: 1
  gather_facts: true

  pre_tasks:
    - name: Read certificate from staging
      ansible.builtin.slurp:
        src: /tmp/vault_cert_staging/cert.pem
      register: _staged_cert

    - name: Read private key from staging
      ansible.builtin.slurp:
        src: /tmp/vault_cert_staging/key.pem
      register: _staged_key
      no_log: true

    - name: Read CA chain from staging
      ansible.builtin.slurp:
        src: /tmp/vault_cert_staging/chain.pem
      register: _staged_chain

    - name: Read serial number from staging
      ansible.builtin.slurp:
        src: /tmp/vault_cert_staging/serial.txt
      register: _staged_serial

    - name: Set certificate facts from staging files
      ansible.builtin.set_fact:
        issued_certificate: "{{ _staged_cert.content | b64decode }}"
        issued_private_key: "{{ _staged_key.content | b64decode }}"
        issued_ca_chain: "{{ _staged_chain.content | b64decode }}"
        issued_serial_number: "{{ _staged_serial.content | b64decode }}"
        issued_fullchain: "{{ _staged_cert.content | b64decode + '\n' + _staged_chain.content | b64decode }}"
      no_log: true

  tasks:
    - name: Deploy certificate to target
      ansible.builtin.include_role:
        name: cert_deploy

    - name: Flush handlers to reload service immediately
      ansible.builtin.meta: flush_handlers

  post_tasks:
    - name: Clean up certificate staging directory
      ansible.builtin.file:
        path: /tmp/vault_cert_staging
        state: absent
