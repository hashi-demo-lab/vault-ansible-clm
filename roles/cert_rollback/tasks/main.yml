---
# roles/cert_rollback/tasks/main.yml
# Restore certificate from backup. Uses cert_backup_path if set,
# otherwise auto-detects the latest backup.

- name: Set rollback common name
  ansible.builtin.set_fact:
    _rollback_cn: "{{ cert_common_name_override | default(vault_cert_common_name, true) }}"

- name: Determine backup path to restore from
  when: cert_backup_path is not defined or cert_backup_path == ""
  block:
    - name: Find latest backup directory
      ansible.builtin.find:
        paths: "{{ cert_backup_base_path }}/{{ _rollback_cn }}"
        file_type: directory
      register: _rollback_backup_dirs

    - name: Validate backups exist
      ansible.builtin.assert:
        that:
          - _rollback_backup_dirs.files | length > 0
        fail_msg: >-
          No backups found at {{ cert_backup_base_path }}/{{ _rollback_cn }}/.
          Cannot rollback without a backup.

    - name: Set backup path to latest
      ansible.builtin.set_fact:
        cert_backup_path: "{{ (_rollback_backup_dirs.files | sort(attribute='path', reverse=true) | first).path }}"

- name: Display rollback source
  ansible.builtin.debug:
    msg: "Rolling back from backup: {{ cert_backup_path }}"

- name: Restore certificate file
  ansible.builtin.copy:
    src: "{{ cert_backup_path }}/cert.pem"
    dest: "{{ cert_dest_cert }}"
    remote_src: true
    owner: "{{ cert_owner }}"
    group: "{{ cert_group }}"
    mode: "{{ cert_file_mode }}"
  notify: "reload {{ cert_service_type }} service"

- name: Restore private key file
  ansible.builtin.copy:
    src: "{{ cert_backup_path }}/key.pem"
    dest: "{{ cert_dest_key }}"
    remote_src: true
    owner: "{{ cert_owner }}"
    group: "{{ cert_group }}"
    mode: "{{ cert_key_mode }}"
  notify: "reload {{ cert_service_type }} service"
  no_log: true

- name: Restore chain file
  ansible.builtin.copy:
    src: "{{ cert_backup_path }}/chain.pem"
    dest: "{{ cert_dest_chain }}"
    remote_src: true
    owner: "{{ cert_owner }}"
    group: "{{ cert_group }}"
    mode: "{{ cert_file_mode }}"
  notify: "reload {{ cert_service_type }} service"
  ignore_errors: true

- name: Restore fullchain file (Nginx)
  ansible.builtin.copy:
    src: "{{ cert_backup_path }}/fullchain.pem"
    dest: "{{ cert_dest_fullchain }}"
    remote_src: true
    owner: "{{ cert_owner }}"
    group: "{{ cert_group }}"
    mode: "{{ cert_file_mode }}"
  when: cert_service_type == "nginx"
  notify: "reload nginx service"
  ignore_errors: true

- name: Regenerate PKCS12 keystore from restored PEM files (Tomcat)
  when: cert_service_type == "tomcat"
  block:
    - name: Fetch Tomcat keystore password from Vault KV
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        auth_method: approle
        role_id: "{{ vault_role_id }}"
        secret_id: "{{ vault_secret_id }}"
        namespace: "{{ vault_namespace | default(omit) }}"
        engine_mount_point: "{{ tomcat_keystore_password_kv_path | regex_replace('/data/.*$', '') }}"
        path: "{{ tomcat_keystore_password_kv_path | regex_replace('^.*/data/', '') }}"
      register: _rollback_ks_password
      no_log: true
      delegate_to: localhost

    - name: Regenerate PKCS12 keystore
      community.crypto.openssl_pkcs12:
        action: export
        path: "{{ tomcat_keystore_path }}"
        certificate_path: "{{ cert_dest_cert }}"
        privatekey_path: "{{ cert_dest_key }}"
        other_certificates_parse_all: true
        other_certificates: "{{ cert_dest_chain }}"
        passphrase: "{{ _rollback_ks_password.secret[tomcat_keystore_password_kv_key] }}"
        friendly_name: "{{ vault_cert_common_name }}"
        owner: "{{ cert_owner }}"
        group: "{{ cert_group }}"
        mode: "0600"
        state: present
      notify: "reload tomcat service"
      no_log: true

- name: Display rollback summary
  ansible.builtin.debug:
    msg: "Rollback complete from {{ cert_backup_path }}. Service handler notified."
