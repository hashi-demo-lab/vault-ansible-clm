---
# roles/cert_verify/tasks/verify_files.yml
# Stage 1: Verify cert files exist, permissions are correct, CN/SAN match, not expired.

- name: Check certificate file exists
  ansible.builtin.stat:
    path: "{{ cert_dest_cert }}"
  register: _cert_file
  failed_when: not _cert_file.stat.exists

- name: Check private key file exists
  ansible.builtin.stat:
    path: "{{ cert_dest_key }}"
  register: _key_file
  failed_when: not _key_file.stat.exists

- name: Verify certificate file permissions
  ansible.builtin.assert:
    that:
      - _cert_file.stat.mode == cert_file_mode
      - _cert_file.stat.pw_name == cert_owner
    fail_msg: >-
      Certificate file permissions incorrect:
      mode={{ _cert_file.stat.mode }} (expected {{ cert_file_mode }}),
      owner={{ _cert_file.stat.pw_name }} (expected {{ cert_owner }})
    success_msg: "Certificate file permissions OK"

- name: Verify private key file permissions
  ansible.builtin.assert:
    that:
      - _key_file.stat.mode == cert_key_mode
      - _key_file.stat.pw_name == cert_owner
    fail_msg: >-
      Private key file permissions incorrect:
      mode={{ _key_file.stat.mode }} (expected {{ cert_key_mode }}),
      owner={{ _key_file.stat.pw_name }} (expected {{ cert_owner }})
    success_msg: "Private key file permissions OK"

- name: Read certificate subject via openssl
  ansible.builtin.command:
    cmd: openssl x509 -in {{ cert_dest_cert }} -noout -subject
  register: _cert_subject
  changed_when: false

- name: Read certificate dates via openssl
  ansible.builtin.command:
    cmd: openssl x509 -in {{ cert_dest_cert }} -noout -enddate
  register: _cert_enddate
  changed_when: false

- name: Read certificate serial via openssl
  ansible.builtin.command:
    cmd: openssl x509 -in {{ cert_dest_cert }} -noout -serial
  register: _cert_serial
  changed_when: false

- name: Check certificate expiry
  ansible.builtin.command:
    cmd: openssl x509 -in {{ cert_dest_cert }} -noout -checkend 0
  register: _cert_expiry_check
  changed_when: false
  failed_when: _cert_expiry_check.rc != 0

- name: Verify certificate common name
  ansible.builtin.assert:
    that:
      - _verify_cn in _cert_subject.stdout
    fail_msg: >-
      CN mismatch: deployed={{ _cert_subject.stdout }},
      expected={{ _verify_cn }}
    success_msg: "Certificate CN matches: {{ _verify_cn }}"

- name: Display certificate info
  ansible.builtin.debug:
    msg: >-
      Certificate verified: {{ _cert_subject.stdout }},
      {{ _cert_enddate.stdout }},
      {{ _cert_serial.stdout }}
