---
# roles/vault_cert_issue/tasks/main.yml
# Issue a certificate from Vault PKI secrets engine via AppRole auth.
# Sets facts: issued_certificate, issued_private_key, issued_ca_chain,
#             issued_serial_number, issued_fullchain

- name: Determine common name
  ansible.builtin.set_fact:
    _cert_cn: "{{ cert_common_name_override | default(vault_cert_common_name, true) }}"

- name: Issue certificate from Vault PKI
  community.hashi_vault.vault_pki_generate_certificate:
    url: "{{ vault_addr }}"
    auth_method: approle
    role_id: "{{ vault_role_id }}"
    secret_id: "{{ vault_secret_id }}"
    namespace: "{{ vault_namespace | default(omit) }}"
    engine_mount_point: "{{ vault_pki_mount }}"
    role_name: "{{ vault_pki_role }}"
    common_name: "{{ _cert_cn }}"
    alt_names: "{{ cert_alt_names_override | default(vault_cert_alt_names, true) | default(omit) }}"
    ip_sans: "{{ vault_cert_ip_sans | default(omit) }}"
    ttl: "{{ vault_cert_ttl }}"
    validate_certs: false
  register: _vault_cert_result
  delegate_to: localhost
  become: false
  no_log: false

- name: Debug - show Vault PKI response structure
  ansible.builtin.debug:
    msg: "Response keys: {{ _vault_cert_result.keys() | list }}, data keys: {{ _vault_cert_result.data.keys() | list if _vault_cert_result.data is mapping else 'NOT A DICT: ' + (_vault_cert_result.data | type_debug) }}"

- name: Set certificate facts
  ansible.builtin.set_fact:
    issued_certificate: "{{ _vault_cert_result.data.data.certificate }}"
    issued_private_key: "{{ _vault_cert_result.data.data.private_key }}"
    issued_ca_chain: "{{ _vault_cert_result.data.data.ca_chain | join('\n') }}"
    issued_serial_number: "{{ _vault_cert_result.data.data.serial_number }}"
    issued_fullchain: "{{ _vault_cert_result.data.data.certificate }}\n{{ _vault_cert_result.data.data.ca_chain | join('\n') }}"
  no_log: false

- name: Display issued certificate summary (no secrets)
  ansible.builtin.debug:
    msg: >-
      Certificate issued for CN={{ _cert_cn }},
      serial={{ issued_serial_number }},
      TTL={{ vault_cert_ttl }}

- name: Export issued certificate data for AAP workflow
  ansible.builtin.set_stats:
    data:
      issued_certificate: "{{ issued_certificate }}"
      issued_private_key: "{{ issued_private_key }}"
      issued_ca_chain: "{{ issued_ca_chain }}"
      issued_serial_number: "{{ issued_serial_number }}"
    per_host: true
